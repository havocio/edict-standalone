<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏛️ 三省六部 · 军机处看板</title>
<style>
  /* ── 设计 Token ─────────────────────────────────────────────────────────── */
  :root {
    --gold:       #c8a96e;
    --gold-light: #e8d5a3;
    --gold-dark:  #8b6914;
    --red:        #c0392b;
    --green:      #27ae60;
    --blue:       #2980b9;
    --purple:     #8e44ad;
    --gray:       #7f8c8d;
    --bg:         #0d0f14;
    --bg2:        #151820;
    --bg3:        #1e2230;
    --border:     rgba(200, 169, 110, 0.2);
    --text:       #e8dcc8;
    --text-dim:   #8b8070;
    --radius:     12px;
    --shadow:     0 4px 24px rgba(0,0,0,.5);
    --transition: 0.3s cubic-bezier(0.16,1,0.3,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 顶栏 ───────────────────────────────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 16px;
    padding: 14px 28px;
    background: rgba(13,15,20,.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-logo { font-size: 22px; letter-spacing: 2px; color: var(--gold); font-weight: 700; }
  .topbar-sub  { font-size: 12px; color: var(--text-dim); margin-left: -8px; }
  .topbar-spacer { flex: 1; }
  .topbar-stats { display: flex; gap: 20px; }
  .stat-item { text-align: center; }
  .stat-num  { font-size: 20px; font-weight: 700; color: var(--gold); line-height:1; }
  .stat-label{ font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .refresh-btn {
    padding: 7px 16px; border-radius: 8px;
    background: rgba(200,169,110,.12); border: 1px solid var(--border);
    color: var(--gold); font-size: 13px; cursor: pointer;
    transition: var(--transition);
  }
  .refresh-btn:hover { background: rgba(200,169,110,.22); }

  /* ── 主区域 ─────────────────────────────────────────────────────────────── */
  .main { display: flex; height: calc(100vh - 57px); }

  /* ── 侧边栏 ─────────────────────────────────────────────────────────────── */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 16px 20px 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--text-dim); text-transform: uppercase;
  }
  .create-area { padding: 0 16px 16px; }
  .create-area textarea {
    width: 100%; padding: 10px 12px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
    resize: none; outline: none;
    transition: border-color var(--transition);
    line-height: 1.6;
  }
  .create-area textarea:focus { border-color: var(--gold); }
  .send-btn {
    margin-top: 8px; width: 100%;
    padding: 9px; border-radius: 8px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; color: #1a1000; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: var(--transition);
  }
  .send-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .task-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
  .task-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    margin-bottom: 4px; border: 1px solid transparent;
    transition: var(--transition);
  }
  .task-item:hover { background: var(--bg3); border-color: var(--border); }
  .task-item.active { background: var(--bg3); border-color: var(--gold); }
  .task-item-id   { font-size: 10px; color: var(--text-dim); font-family: monospace; }
  .task-item-title { font-size: 13px; margin-top: 2px; line-height: 1.4; }
  .task-item-state { display: inline-block; margin-top: 4px; }

  /* ── 主内容 ─────────────────────────────────────────────────────────────── */
  .content {
    flex: 1; overflow-y: auto;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-dim); gap: 12px; text-align: center;
  }
  .empty-icon { font-size: 56px; opacity: .4; }
  .empty-text { font-size: 15px; }
  .empty-sub  { font-size: 13px; opacity: .7; }

  /* ── 任务详情卡片 ───────────────────────────────────────────────────────── */
  .task-header {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .task-header-left { flex: 1; }
  .task-id-badge {
    font-family: monospace; font-size: 12px; color: var(--text-dim);
    background: var(--bg3); padding: 3px 8px; border-radius: 4px;
    display: inline-block; margin-bottom: 8px;
  }
  .task-title { font-size: 20px; font-weight: 700; color: var(--gold-light); line-height: 1.3; }
  .task-content { font-size: 13px; color: var(--text-dim); margin-top: 6px; line-height: 1.6; }
  .task-meta { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  .meta-item { font-size: 12px; color: var(--text-dim); }
  .task-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
  .action-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
    border: 1px solid; transition: var(--transition);
  }
  .action-btn.cancel { border-color: var(--red); color: var(--red); background: transparent; }
  .action-btn.cancel:hover { background: rgba(192,57,43,.1); }
  .action-btn.advance { border-color: var(--gold); color: var(--gold); background: transparent; }
  .action-btn.advance:hover { background: rgba(200,169,110,.1); }
  .action-btn.unblock { border-color: #e67e22; color: #e67e22; background: transparent; }
  .action-btn.unblock:hover { background: rgba(230,126,34,.12); }


  /* ── 状态流 ─────────────────────────────────────────────────────────────── */
  .flow-track {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
  }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 14px;
  }
  .flow-steps {
    display: flex; gap: 0; align-items: center;
    overflow-x: auto; padding-bottom: 4px;
  }
  .flow-step {
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; min-width: 72px; position: relative;
  }
  .flow-step::after {
    content: ""; position: absolute; right: -16px; top: 14px;
    width: 32px; height: 2px;
    background: var(--border);
  }
  .flow-step:last-child::after { display: none; }
  .flow-step .dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg3); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: var(--transition);
  }
  .flow-step.active .dot   { border-color: var(--gold); background: rgba(200,169,110,.15); }
  .flow-step.done .dot     { border-color: var(--green); background: rgba(39,174,96,.15); }
  .flow-step.rejected .dot { border-color: var(--red);   background: rgba(192,57,43,.15); }
  .flow-step .label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .flow-step.active .label { color: var(--gold); }
  .flow-step.done .label   { color: var(--green); }

  /* ── 流转日志 ───────────────────────────────────────────────────────────── */
  .log-container {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
  }
  .log-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .log-item {
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 12px; line-height: 1.5;
  }
  .log-time  { color: var(--text-dim); white-space: nowrap; font-family: monospace; flex-shrink: 0; }
  .log-arrow { color: var(--gold); flex-shrink: 0; }
  .log-agent { color: var(--blue); flex-shrink: 0; font-weight: 600; }
  .log-note  { color: var(--text); }

  /* ── 进展日志 ───────────────────────────────────────────────────────────── */
  .progress-container {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
  }
  .progress-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
  .progress-item {
    background: var(--bg3); border-radius: 8px; padding: 10px 12px;
  }
  .progress-header { display: flex; gap: 10px; align-items: center; margin-bottom: 4px; }
  .progress-agent  { font-size: 12px; font-weight: 700; color: var(--purple); }
  .progress-time   { font-size: 11px; color: var(--text-dim); font-family: monospace; }
  .progress-tokens { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .progress-doing  { font-size: 13px; color: var(--text); line-height: 1.5; }
  .progress-todos  { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
  .progress-todo   { font-size: 12px; color: var(--text-dim); }

  /* ── 最终结果 ───────────────────────────────────────────────────────────── */
  .result-card {
    background: var(--bg2);
    border: 1px solid rgba(39,174,96,.3);
    border-radius: var(--radius); padding: 20px 24px;
  }
  .result-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 12px; }
  .result-body  {
    font-size: 14px; line-height: 1.8; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }

  /* ── 状态徽章 ───────────────────────────────────────────────────────────── */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
  }
  .badge-Pending   { background: rgba(127,140,141,.2); color: var(--gray); }
  .badge-Taizi     { background: rgba(200,169,110,.15); color: var(--gold); }
  .badge-Zhongshu  { background: rgba(41,128,185,.15); color: var(--blue); }
  .badge-Menxia    { background: rgba(142,68,173,.15); color: var(--purple); }
  .badge-Assigned  { background: rgba(230,126,34,.15); color: #e67e22; }
  .badge-Doing     { background: rgba(52,152,219,.15); color: #3498db; }
  .badge-Review    { background: rgba(241,196,15,.15); color: #f1c40f; }
  .badge-Done      { background: rgba(39,174,96,.15); color: var(--green); }
  .badge-Cancelled { background: rgba(192,57,43,.15); color: var(--red); }
  .badge-Blocked   { background: rgba(192,57,43,.1); color: #e74c3c; }

  /* ── 滚动条 ─────────────────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── 动画 ───────────────────────────────────────────────────────────────── */
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn .3s ease forwards; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .pulse { animation: pulse 1.5s ease infinite; }
</style>
</head>
<body>

<!-- ── 顶栏 ─────────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-logo">🏛️ Edict</div>
  <div class="topbar-sub" id="regime-name">制度看板</div>
  <div class="topbar-spacer"></div>
  <div class="topbar-stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">总任务</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-running" style="color:#3498db">—</div>
      <div class="stat-label">进行中</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-done" style="color:var(--green)">—</div>
      <div class="stat-label">已完成</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadTasks()">⟳ 刷新</button>
</div>

<!-- ── 主区域 ────────────────────────────────────────────────────────────── -->
<div class="main">

  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-title">下旨</div>
    <div class="create-area">
      <textarea id="msg-input" rows="4" placeholder="在此输入旨意，太子将为您分拣…"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">⚡ 传旨</button>
    </div>
    <div class="sidebar-title" style="margin-top:4px">旨意台账</div>
    <div class="task-list" id="task-list">
      <!-- 动态渲染 -->
    </div>
  </div>

  <!-- 内容区 -->
  <div class="content" id="content">
    <div class="empty-state">
      <div class="empty-icon">🏯</div>
      <div class="empty-text">军机处待命</div>
      <div class="empty-sub">在左侧下旨，或选中一项旨意查看详情</div>
    </div>
  </div>

</div>

<script>
// ─── 状态 ───────────────────────────────────────────────────────────────────
const API = '';   // 同域
let tasks      = [];
let activeId   = null;
let autoRefresh = null;

// 状态流（用于流程可视化）
const FLOW_STATES = ['Pending','Taizi','Zhongshu','Menxia','Assigned','Doing','Review','Done'];
const FLOW_LABELS = {'Pending':'待处理','Taizi':'太子','Zhongshu':'中书省','Menxia':'门下省',
                     'Assigned':'尚书省','Doing':'六部执行','Review':'复核','Done':'完成'};
const FLOW_ICONS  = {'Pending':'⌛','Taizi':'👑','Zhongshu':'📜','Menxia':'⚖️',
                     'Assigned':'📋','Doing':'⚙️','Review':'🔍','Done':'✅'};

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

// ─── 加载任务列表 ─────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const [data, stats] = await Promise.all([
      api('/api/tasks'),
      api('/api/stats'),
    ]);
    const oldTasks = tasks;
    tasks = Array.isArray(data) ? data.reverse() : [];
    renderStats(stats);
    renderTaskList();

    // 自动选中当前任务或最新任务
    if (activeId) {
      const current = tasks.find(t => t.id === activeId);
      if (current) {
        renderTaskDetail(current);
        // 任务已完成或取消，停止自动刷新
        if (['Done','Cancelled','Blocked'].includes(current.state)) {
          stopAutoRefresh();
        }
        return;
      }
    }

    // 如果有进行中的任务，自动选中它
    const running = tasks.find(t => !['Done','Cancelled'].includes(t.state));
    if (running) {
      selectTask(running.id);
      return;
    }

    // 否则选中最新任务
    if (tasks.length > 0) {
      selectTask(tasks[0].id);
      stopAutoRefresh();
    } else {
      renderTaskDetail(null);
      stopAutoRefresh();
    }
  } catch(e) {
    console.error('加载失败', e);
  }
}

function renderStats(stats) {
  const s = stats || {};
  document.getElementById('stat-total').textContent   = s.total ?? tasks.length;
  const done    = (s.by_state||{}).Done || 0;
  const running = tasks.filter(t => !['Done','Cancelled'].includes(t.state)).length;
  document.getElementById('stat-done').textContent    = done;
  document.getElementById('stat-running').textContent = running;
}

// ─── 侧边任务列表 ─────────────────────────────────────────────────────────
function renderTaskList() {
  const el = document.getElementById('task-list');
  if (!tasks.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px 0">暂无旨意</div>';
    return;
  }
  el.innerHTML = tasks.map(t => `
    <div class="task-item ${t.id === activeId ? 'active' : ''}" onclick="selectTask('${t.id}')">
      <div class="task-item-id">${t.id}</div>
      <div class="task-item-title">${esc(t.title)}</div>
      <span class="badge badge-${t.state} task-item-state">${t.state}</span>
    </div>
  `).join('');
}

// ─── 选中任务 ─────────────────────────────────────────────────────────────
function selectTask(id) {
  activeId = id;
  const task = tasks.find(t => t.id === id);
  renderTaskList();
  renderTaskDetail(task);
  // 运行中的任务自动刷新
  if (task && !['Done','Cancelled'].includes(task.state)) {
    startAutoRefresh();
  } else {
    stopAutoRefresh();
  }
}

// ─── 任务详情渲染 ─────────────────────────────────────────────────────────
function renderTaskDetail(task) {
  const el = document.getElementById('content');
  if (!task) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📜</div>
      <div class="empty-text">未找到该旨意</div>
    </div>`;
    return;
  }

  const isDone      = task.state === 'Done';
  const isCancelled = task.state === 'Cancelled';
  const isBlocked   = task.state === 'Blocked';
  const isActive    = !isDone && !isCancelled;
  const stateIdx    = FLOW_STATES.indexOf(task.state);

  // 流程步骤
  const flowHTML = FLOW_STATES.map((s, i) => {
    let cls = '';
    if (i < stateIdx || isDone)    cls = 'done';
    else if (i === stateIdx)        cls = 'active';
    return `
      <div class="flow-step ${cls}">
        <div class="dot">${FLOW_ICONS[s]}</div>
        <div class="label">${FLOW_LABELS[s]}</div>
      </div>`;
  }).join('');

  // 流转日志（最新在前）
  const flowLog = [...(task.flow_log || [])].reverse();
  const flowLogHTML = flowLog.map(f => `
    <div class="log-item">
      <span class="log-time">${f.time?.slice(11,19)||''}</span>
      <span class="log-arrow">${f.from||'—'} → ${f.to}</span>
      <span class="log-agent">[${f.agent||'?'}]</span>
      <span class="log-note">${esc(f.note||'')}</span>
    </div>`).join('');

  // 进展日志（最新在前）
  const progLog = [...(task.progress_log || [])].reverse();
  const progHTML = progLog.map(p => `
    <div class="progress-item">
      <div class="progress-header">
        <span class="progress-agent">${p.agent||''}</span>
        <span class="progress-time">${p.time?.slice(11,19)||''}</span>
        ${p.tokens ? `<span class="progress-tokens">🔢 ${p.tokens} tokens</span>` : ''}
      </div>
      <div class="progress-doing">${esc(p.doing||'')}</div>
      ${p.todos?.length ? `<div class="progress-todos">${p.todos.map(t=>`<div class="progress-todo">• ${esc(t)}</div>`).join('')}</div>` : ''}
    </div>`).join('');

  const resultHTML = task.result ? `
    <div class="result-card fade-in">
      <div class="result-title">📋 最终回奏</div>
      <div class="result-body">${esc(task.result)}</div>
    </div>` : '';

  const actionBtns = isBlocked ? `
    <button class="action-btn unblock" onclick="unblockTask('${task.id}')">🔓 解除阻塞</button>
    <button class="action-btn cancel" onclick="cancelTask('${task.id}')">✕ 取消</button>
  ` : isActive ? `
    <button class="action-btn advance" onclick="advanceTask('${task.id}')">⚡ 手动推进</button>
    <button class="action-btn cancel" onclick="cancelTask('${task.id}')">✕ 取消</button>
  ` : '';

  el.innerHTML = `
    <!-- 任务标题卡 -->
    <div class="task-header fade-in">
      <div class="task-header-left">
        <div class="task-id-badge">${task.id}</div>
        <div class="task-title">${esc(task.title)}</div>
        ${task.content ? `<div class="task-content">${esc(task.content.slice(0,200))}${task.content.length>200?'…':''}</div>` : ''}
        <div class="task-meta">
          <span class="badge badge-${task.state}">${task.state}</span>
          <span class="meta-item">创建 ${task.created_at?.slice(0,16)||''}</span>
          <span class="meta-item">更新 ${task.updated_at?.slice(0,16)||''}</span>
        </div>
      </div>
      <div class="task-actions">${actionBtns}</div>
    </div>

    <!-- 状态流程 -->
    <div class="flow-track fade-in">
      <div class="section-title">流转路径</div>
      <div class="flow-steps">${flowHTML}</div>
    </div>

    <!-- 最终结果 -->
    ${resultHTML}

    <!-- 进展日志 -->
    ${progLog.length ? `
    <div class="progress-container fade-in">
      <div class="section-title">实时进展 (${progLog.length})</div>
      <div class="progress-list">${progHTML}</div>
    </div>` : ''}

    <!-- 流转日志 -->
    ${flowLog.length ? `
    <div class="log-container fade-in">
      <div class="section-title">流转日志 (${flowLog.length})</div>
      <div class="log-list">${flowLogHTML}</div>
    </div>` : ''}
  `;
}

// ─── 发送消息 ─────────────────────────────────────────────────────────────
let _pollTimer = null;

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const btn   = document.getElementById('send-btn');
  const msg   = input.value.trim();
  if (!msg) return;

  btn.disabled = true;
  btn.textContent = '传旨中…';

  try {
    await api('/api/tasks/create', 'POST', { message: msg });
    input.value = '';
    // 开始轮询：等pipeline完成后获取结果
    startPollForResult();
  } catch(e) {
    alert('传旨失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ 传旨';
  }
}

// 轮询获取最新处理结果
function startPollForResult() {
  stopPollForResult();
  const content = document.getElementById('content');
  // 显示处理中状态
  content.innerHTML = `<div class="empty-state">
    <div class="empty-icon pulse">⚡</div>
    <div class="empty-text">太子正在分拣旨意...</div>
    <div class="empty-sub">请稍候</div>
  </div>`;

  _pollTimer = setInterval(async () => {
    try {
      const latest = await api('/api/tasks/latest');
      if (!latest.pending) {
        stopPollForResult();
        // 处理完成
        if (latest.task_id) {
          // 正式任务：刷新列表并选中
          await loadTasks();
          selectTask(latest.task_id);
          startAutoRefresh();
        } else if (latest.result) {
          // 闲聊回复：直接显示
          renderChatReply(latest.result);
        } else if (latest.error) {
          content.innerHTML = `<div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <div class="empty-text">处理异常</div>
            <div class="empty-sub">${esc(latest.error)}</div>
          </div>`;
        }
      }
    } catch(e) {
      console.error('轮询失败', e);
    }
  }, 1000);
}

function stopPollForResult() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// 渲染闲聊回复
function renderChatReply(reply) {
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="result-card fade-in" style="border-color: rgba(200,169,110,.3);">
      <div class="result-title" style="color:var(--gold)">💬 太子回复</div>
      <div class="result-body">${esc(reply)}</div>
    </div>
  `;
}

// ─── 手动推进 ─────────────────────────────────────────────────────────────
async function advanceTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const allowedMap = {
    'Pending':  ['Taizi'],
    'Taizi':    ['Zhongshu','Done'],
    'Zhongshu': ['Menxia'],
    'Menxia':   ['Assigned','Zhongshu'],
    'Assigned': ['Doing'],
    'Doing':    ['Review'],
    'Review':   ['Done','Doing'],
  };
  const nexts = allowedMap[task.state] || [];
  if (!nexts.length) { alert('当前状态无法手动推进'); return; }
  const next = nexts.length === 1 ? nexts[0]
    : prompt(`选择目标状态 (${nexts.join(' / ')})`);
  if (!next || !nexts.includes(next)) return;
  await api('/api/tasks/advance', 'POST', { task_id: id, state: next });
  loadTasks();
}

// ─── 取消任务 ─────────────────────────────────────────────────────────────
async function cancelTask(id) {
  if (!confirm('确认取消该任务？')) return;
  await api('/api/tasks/cancel', 'POST', { task_id: id, reason: '用户手动取消' });
  loadTasks();
}

// ─── 解除阻塞 ─────────────────────────────────────────────────────────────
async function unblockTask(id) {
  const note = prompt('请描述解除阻塞的原因（可留空）：', '人工排查后解除');
  if (note === null) return;   // 用户点取消
  await api('/api/tasks/unblock', 'POST', { task_id: id, note: note || '人工解除阻塞' });
  loadTasks();
}

// ─── 自动刷新 ─────────────────────────────────────────────────────────────
function startAutoRefresh() {
  stopAutoRefresh();
  autoRefresh = setInterval(loadTasks, 3000);
}
function stopAutoRefresh() {
  if (autoRefresh) { clearInterval(autoRefresh); autoRefresh = null; }
}

// ─── 工具 ─────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// 回车发送（Shift+Enter 换行）
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// 初始化
loadTasks();
</script>
